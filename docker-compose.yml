services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tts_cards
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://app:app_password@db:3306/tts_cards
      TTS_LANG: ru
      FLASK_SECRET_KEY: change-me-in-production
      MAX_CONTENT_LENGTH_MB: 16
    ports:
      - "4000:4000"
    volumes:
      - audio_data:/app/static/audio
      - upload_data:/app/static/uploads

volumes:
  mysql_data:
  audio_data:
  upload_data:
